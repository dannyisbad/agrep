            }
            html[data-theme="kawaii"] .sec .sq {
                border-radius: 50%;
                box-shadow: 0 0 0 3px #ffdbeb;
            }
            html[data-theme="kawaii"] .ci.sel {
                background: #fff0f7;
                box-shadow: inset 3px 0 0 #ff74ad;
            }
            html[data-theme="kawaii"] .ph .big {
                color: #ffdce9;
            }
            html[data-theme="kawaii"] ::-webkit-scrollbar-thumb {
                background: #ffb6d5;
                border-radius: 6px;
                border: 2px solid #fff0f7;
            }

            /* ---------- 1999 WEB (▦) — clean early-web, usable like og google ---------- */
            html[data-theme="web99"] {
                --bg: #ffffff;
                --panel: #ffffff;
                --panel2: #f6f6f6;
                --rail: #f3f3f3;
                --line: #bcbcbc;
                --hair: #dcdcdc;
                --ink: #000000;
                --dim: #1a1a1a;
                --faint: #666666;
                --ghost: #9a9a9a;
                --calm: #008000;
                --warm: #c07000;
                --ember: #cc0000;
                --hot: #cc0000;
                --mono: "Times New Roman", Times, serif;
                --disp: "Times New Roman", Times, serif;
            }
            html[data-theme="web99"] body {
                font-size: 14px;
                line-height: 1.5;
                background: #fff;
            }
            html[data-theme="web99"] body::before {
                display: none;
            }
            html[data-theme="web99"] .top {
                background: #eaeaea;
                border-bottom: 2px solid #999;
                box-shadow: inset 0 1px 0 #fff;
            }
            html[data-theme="web99"] .topin {
                gap: 14px;
            }
            html[data-theme="web99"] .word {
                font-weight: 700;
                font-size: 30px;
                letter-spacing: -1px;
                line-height: 1;
            }
            html[data-theme="web99"] .word .wl {
                text-shadow: 1px 1px 0 #bdbdbd;
            }
            html[data-theme="web99"] .word .wl:nth-child(1) {
                color: #0000cc;
            }
            html[data-theme="web99"] .word .wl:nth-child(2) {
                color: #cc0000;
            }
            html[data-theme="web99"] .word .wl:nth-child(3) {
                color: #e8a800;
            }
            html[data-theme="web99"] .word .wl:nth-child(4) {
                color: #008000;
            }
            html[data-theme="web99"] .word b {
                font-size: 0;
            }
            html[data-theme="web99"] .word b::after {
                content: "!";
                font-size: 30px;
                color: #0000cc;
                text-shadow: 1px 1px 0 #bdbdbd;
            }
            html[data-theme="web99"] .askbar {
                border: 0;
                background: transparent;
                gap: 5px;
            }
            html[data-theme="web99"] :is(.askbar input, .find input) {
                border: 2px inset #c0c0c0;
                background: #fff;
                color: #000;
                font-family: "Times New Roman", serif;
                font-size: 14px;
                padding: 3px 6px;
                box-shadow: none;
            }
            html[data-theme="web99"]
                :is(
                    button,
                    .themebtn,
                    .statuschip,
                    .views button,
                    .seg button,
                    .chip,
                    .askbar button,
                    .more
                ) {
                background: #c0c0c0;
                color: #000;
                border: 2px outset #e4e4e4;
                border-radius: 0;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 12px;
                box-shadow: none;
                padding: 3px 10px;
            }
            html[data-theme="web99"]
                :is(.views button.on, .seg button.on, .chip.on) {
                border-style: inset;
                background: #aeaeae;
            }
            html[data-theme="web99"] :is(button:active, .askbar button:active) {
                border-style: inset;
            }
            html[data-theme="web99"] .askbar button {
                font-weight: 700;
            }
            html[data-theme="web99"] .rail {
                background: #f3f3f3;
                border-right: 2px solid #999;
            }
            html[data-theme="web99"] .find {
                border: 2px inset #c0c0c0;
                background: #fff;
                border-radius: 0;
            }
            html[data-theme="web99"] .chip {
                padding: 2px 7px;
            }
            html[data-theme="web99"] .ci {
                border-bottom: 1px dotted #bbb;
            }
            html[data-theme="web99"] .ci .ttl {
                color: #0000ee;
                text-decoration: underline;
                font-family: "Times New Roman", serif;
                font-size: 14px;
                -webkit-line-clamp: 2;
            }
            html[data-theme="web99"] .ci:hover {
                background: #eef2ff;
            }
            html[data-theme="web99"] .ci:hover .ttl {
                color: #cc0000;
            }
            html[data-theme="web99"] .ci.sel {
                background: #000080;
                box-shadow: none;
            }
            html[data-theme="web99"]
                :is(
                    .ci.sel .ttl,
                    .ci.sel .mt,
                    .ci.sel .ag,
                    .ci.sel .pj,
                    .ci.sel .heat
                ) {
                color: #fff;
            }
            html[data-theme="web99"] .grp {
                background: #e2e2e2;
                border-top: 1px solid #cfcfcf;
                color: #333;
                font-family: Arial, sans-serif;
                font-weight: 700;
                font-size: 11px;
            }
            html[data-theme="web99"] .grp b {
                color: #000;
            }
            html[data-theme="web99"] .det h2 {
                font-family: "Times New Roman", serif;
                font-weight: 700;
                font-size: 23px;

                </div>

                <div class="pk-list" id="pklist"></div>
                <div class="pk-foot" id="pkfoot"></div>

        <script>
            const $ = (id) => document.getElementById(id);
            const esc = (s) =>
                String(s == null ? "" : s).replace(
                    /[&<>]/g,
                    (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c],
                );
            const fmt = (n) => Number(n).toLocaleString();
            const J = async (u) => {
                const r = await fetch(u);
                if (!r.ok) throw new Error(r.status);
                return r.json();
            };
            // tidy a raw model id for display (drop trailing date stamps; leave the rest legible)
            const prettyModel = (m) =>
                String(m || "")
                    .replace(/[-_](\d{6,8})$/, "")
                    .trim();

            // compact relative/absolute timestamp: "now" / "3h" / "2d" / "may 28" / "jan 3 '25"
            const MON = [
                "jan",
                "feb",
                "mar",
                "apr",
                "may",
                "jun",
                "jul",
                "aug",
                "sep",
                "oct",
                "nov",
                "dec",
            ];
            function ago(ts) {
                if (!ts) return "";
                const d = new Date(ts),
                    now = Date.now(),
                    s = (now - ts) / 1000;
                if (s < 90) return "now";
                if (s < 3600) return Math.round(s / 60) + "m";
                if (s < 86400) return Math.round(s / 3600) + "h";
                if (s < 86400 * 7) return Math.round(s / 86400) + "d";
                const lab = MON[d.getMonth()] + " " + d.getDate();
                return d.getFullYear() === new Date(now).getFullYear()
                    ? lab
                    : lab + " '" + String(d.getFullYear()).slice(2);
            }
            // date bucket for group-by-date (ordered; renderers respect this order, not counts)
            const DBUCKETS = ["dToday", "dYest", "dWeek", "dMonth", "dOlder"];
            function dateBucket(ts) {
                if (!ts) return "dOlder";
                const d = new Date(ts),
                    n = new Date();
                const day = (x) =>
                    Math.floor(
                        (x - new Date(x).getTimezoneOffset() * 60000) /
                            86400000,
                    );
                const dd = day(n.getTime()) - day(ts);
                if (dd <= 0) return "dToday";
                if (dd === 1) return "dYest";
                if (dd < 7) return "dWeek";
                if (dd < 31) return "dMonth";
                return "dOlder";
            }

            // active search terms + a separator-flexible regex (set by runSearch, cleared on exit). The
            // regex lets a multi-word term match across space/hyphen/underscore, matching the backend
            // keyword search so "cyber filter" highlights "cyber-filter" too.
            let HILITE = [],
                HILITE_RE = null;
            function buildHiRe(terms) {
                const parts = (terms || [])
                    .map((t) =>
                        String(t)
                            .trim()
                            .split(/[\s\-_]+/)
                            .filter(Boolean)
                            .map((x) =>
                                x.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"),
                            )
                            .join("[\\s\\-_]*"),
                    )
                    .filter(Boolean)
                    .sort((a, b) => b.length - a.length);
                if (!parts.length) return null;
                try {
                    return new RegExp("(" + parts.join("|") + ")", "gi");
                } catch (e) {
                    return null;
                }
            }
            function hl(text, _terms) {
                const s = esc(text);
                if (!HILITE_RE) return s;
                return s.replace(HILITE_RE, "<mark>$1</mark>");
            }
            const matchesHi = (s) => {
                if (!HILITE_RE) return false;
                HILITE_RE.lastIndex = 0;
                return HILITE_RE.test(s || "");
            };
            // Minimal, safe markdown for MODEL REPLIES ONLY (never user text or tool I/O).
            // Escapes first, then a compact subset. mdInline = no block elements (for the
            // one-line live previews); mdHTML = full blocks (for the chat-detail reply).
            function mdInline(t) {
                t = esc(t);
                t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
                t = t.replace(/\*\*([^*]+?)\*\*/g, "<b>$1</b>");
                t = t.replace(/(^|[^*])\*([^*\n]+?)\*/g, "$1<i>$2</i>");
                t = t.replace(
                    /(^|[\s(])_([^_\n]+?)_(?=[\s).,!?]|$)/g,
                    "$1<i>$2</i>",
                );
                t = t.replace(
                    /\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
                    '<a href="$2" target="_blank" rel="noopener">$1</a>',
                );
                return t;
            }
            function mdHTML(raw) {
                if (!raw) return "";
                const blk = [];
                const src = String(raw).replace(
                    /```[^\n]*\n?([\s\S]*?)```/g,
                    (m, c) => {
                        blk.push(esc(c.replace(/\s+$/, "")));
                        return "␀B" + (blk.length - 1) + "␀";
                    },
                );
                const out = [];
                let para = [],
                    list = null;
                const fp = () => {
                    if (para.length) {
                        out.push("<p>" + mdInline(para.join(" ")) + "</p>");
                        para = [];
                    }
                };
                const fl = () => {
                    if (list) {
                        out.push(
                            "<" +
                                list.t +
                                ">" +
                                list.i
                                    .map((x) => "<li>" + mdInline(x) + "</li>")
                                    .join("") +
                                "</" +
                                list.t +
                                ">",
                        );
                        list = null;
                    }
                };
                for (const ln of src.split(/\r?\n/)) {
                    let m;
                    if ((m = ln.match(/^␀B(\d+)␀$/))) {
                        fp();
                        fl();
                        out.push(
                            "<pre><code>" + blk[+m[1]] + "</code></pre>",
                        );
                        continue;
                    }
                    if (!ln.trim()) {
                        fp();
                        fl();
                        continue;
                    }
                    if ((m = ln.match(/^#{1,6}\s+(.+)$/))) {
                        fp();
                        fl();
                        out.push('<div class="mdh">' + mdInline(m[1]) + "</div>");
                        continue;
                    }
                    if (/^\s*>\s?/.test(ln)) {
                        fp();
                        out.push(
                            '<div class="mdq">' +
                                mdInline(ln.replace(/^\s*>\s?/, "")) +
                                "</div>",
                        );
                        continue;
                    }
                    if ((m = ln.match(/^\s*[-*+]\s+(.+)$/))) {
                        fp();
                        if (!list || list.t !== "ul") {
                            fl();
                            list = { t: "ul", i: [] };
                        }
                        list.i.push(m[1]);
                        continue;
                    }
                    if ((m = ln.match(/^\s*\d+[.)]\s+(.+)$/))) {
                        fp();
                        if (!list || list.t !== "ol") {
                            fl();
                            list = { t: "ol", i: [] };
                        }
                        list.i.push(m[1]);
                        continue;
                    }
                    if (/^\s*([-*_])(?:\s*\1){2,}\s*$/.test(ln)) {
                        fp();
                        fl();
                        out.push("<hr>");
                        continue;
                    }
                    fl();
                    para.push(ln.trim());
                }
                fp();
                fl();
                return out.join("");
            }

            // a home/desktop cwd carries no project signal (the agent just mkdir'd & cd'd, or never did),
            // so show the concept thread instead of yet another "Users/<name>". A dir is "generic" when
            // every one of its path segments is a home/container name. The username segment arrives
            // with /stats (the server knows whose home this is); it's merged in at boot.
            const GENERICSEG = new Set([
                "users",
                "user",
                "desktop",
                "documents",
                "downloads",
                "home",
                "tmp",
                "temp",
                "appdata",
                "onedrive",
                "",
                ".",
                "·",
            ]);
            function isGenericDir(p) {
                const segs = String(p || "")
                    .toLowerCase()
                    .split(/[\/\\]/)
                    .filter(Boolean);
                return (
                    segs.length === 0 || segs.every((s) => GENERICSEG.has(s))
                );
            }
            function dirOf(c) {
                const p = (c.project || "").trim();
                if (p && !isGenericDir(p)) return p;
                const k = (c.concept || "").trim();
                return k ? shortConcept(k) : p || "·";
            }

            // heat ramp: rage_raw (or mean) -> color along calm->warm->ember. Per-theme endpoints so
            // the mid-tone never lands on washed-out yellow over a light background.
            const HEAT_RAMP = {
                noir: [
                    [58, 214, 196],
                    [255, 176, 0],
                    [255, 74, 46],
                ], // teal -> amber -> ember (reads on charcoal)
                kawaii: [
                    [28, 168, 150],
                    [214, 92, 52],
                    [224, 46, 120],
                ], // deep teal -> burnt coral -> hot pink (reads on pink)
                web99: [
                    [0, 120, 0],
                    [176, 92, 0],
                    [200, 0, 0],
                ], // green -> dark amber -> red (reads on white)
            };
            function heatColor(v) {
                // v ~ 0..0.6
                const r =
                    HEAT_RAMP[document.documentElement.dataset.theme] ||
                    HEAT_RAMP.noir;
                const t = Math.max(0, Math.min(1, v / 0.45));
                if (t < 0.5) {
                    const k = t / 0.5;
                    return mix(r[0], r[1], k);
                } // calm->warm
                const k = (t - 0.5) / 0.5;
                return mix(r[1], r[2], k); // warm->ember
            }
            function mix(a, b, k) {
                return `rgb(${a.map((x, i) => Math.round(x + (b[i] - x) * k)).join(",")})`;
            }

            const PREF = (k) => {
                try {
                    return localStorage.getItem(k);
                } catch (e) {
                    return null;
                }
            };
            let CHATS = [],
                CONCEPTS = [],
                STATE = {
                    group: PREF("tiltGroup") || "date",
                    sort: PREF("tiltSort") || "recent",
                    filter: "",
                    chip: null,
                    sel: null,
                    view: "explore",
                };
            function syncSegs() {
                $("groupSeg")
                    .querySelectorAll("button")
                    .forEach((b) =>
                        b.classList.toggle("on", b.dataset.g === STATE.group),
                    );
                $("sortSeg")
                    .querySelectorAll("button")
                    .forEach((b) =>
                        b.classList.toggle("on", b.dataset.s === STATE.sort),
                    );
            }
            let SEARCH = { active: false, q: "", results: null, busy: false }; // semantic results override the grouped list
            const bySession = {}; // session -> chat row, for enriching search hits

            // ============================ rail / organizer ============================
            function matches(c, f) {
                if (!f) return true;
                const hay = (
                    (c.title || "") +
                    " " +
                    c.summary +
                    " " +
                    c.tags.join(" ") +
                    " " +
                    c.project +
                    " " +
                    c.agent +
                    " " +
                    c.concept
                ).toLowerCase();
                return f.split(/\s+/).every((w) => hay.includes(w));
            }
            function chatTitle(c) {
                if (c.title) return c.title; // the generated scannable title, when built
                // fallback: first sentence of summary, trimmed; then tags
                let s = (c.summary || "").trim();
                if (s) {
                    const m = s.match(/^(.{0,110}?[.!?])(\s|$)/);
                    return m
                        ? m[1]
                        : s.slice(0, 110) + (s.length > 110 ? "…" : "");
                }
                return (c.tags || []).length
                    ? c.tags.join(", ")
                    : "(untitled chat)";
            }
            function groupKey(c) {
                if (STATE.group === "agent") return c.agent || "?";
                // home-dir cwds ("Users/<you>", "<you>/Desktop") are one no-project bucket, not
                // two confusing pseudo-projects
                if (STATE.group === "project") {
                    const p = c.project || "?";
                    return isGenericDir(p) ? "~" : p;
                }
                if (STATE.group === "concept")
                    return c.concept || "(unclustered)";
                if (STATE.group === "date") return dateBucket(c.last_ts);
                return "all chats";
            }
            function renderChips() {
                const el = $("chips");
                if (STATE.group === "none") {
                    el.style.display = "none";
                    return;
                }
                el.style.display = "flex";
                const counts = {};
                CHATS.filter((c) => matches(c, STATE.filter)).forEach((c) => {
                    const k = groupKey(c);
                    counts[k] = (counts[k] || 0) + 1;
                });
                const keys =
                    STATE.group === "date"
                        ? DBUCKETS.filter((k) => counts[k])
                        : Object.keys(counts).sort(
                              (a, b) => counts[b] - counts[a],
                          );
                el.innerHTML = keys
                    .map((k) => {
                        const lab =
                            STATE.group === "concept"
                                ? shortConcept(k)
                                : STATE.group === "date"
                                  ? C(k)
                                  : k;
                        return `<button class="chip${STATE.chip === k ? " on" : ""}" data-k="${esc(k)}">${esc(lab)}<small>${counts[k]}</small></button>`;
                    })
                    .join("");
                el.querySelectorAll(".chip").forEach(
                    (b) =>
                        (b.onclick = () => {
                            STATE.chip =
                                STATE.chip === b.dataset.k ? null : b.dataset.k;
                            renderRail();
                        }),
                );
            }
            function shortConcept(k) {
                return k
                    .split(",")
                    .slice(0, 3)
                    .map((s) => s.trim())
                    .join(" · ");
            }

            // ---- search: "quoted" => exact keyword over real message+reply text; else semantic ----
            async function runSearch(q, fromHash) {
                q = q.trim();
                if (!q) {
                    exitSearch(fromHash);
                    return;
                }
                const quoted = q.length >= 2 && q[0] == '"' && q.endsWith('"');
                const term = quoted ? q.slice(1, -1).trim() : q;
                if (!term) {
                    exitSearch(fromHash);
                    return;
                }
                HILITE = quoted
                    ? [term]
                    : term
                          .toLowerCase()
                          .split(/\s+/)
                          .filter((w) => w.length > 2);
                HILITE_RE = buildHiRe(HILITE);
                SEARCH = {
                    active: true,
                    q: term,
                    results: null,
                    busy: true,
                    mode: quoted ? "keyword" : "semantic",
                };
                $("findicon").textContent = quoted ? "⌕" : "≈";
                if (!fromHash) writeHash();
                renderSearchList();
                try {
                    const o = await J(
                        "/search?k=40&q=" + encodeURIComponent(q),
                    ); // raw q (server detects quotes)
                    SEARCH.results = o.results || [];
                    SEARCH.mode = o.mode || SEARCH.mode;
                    SEARCH.total = o.total;
                    SEARCH.chats = o.chats;
                    SEARCH.busy = false;
                } catch (e) {
                    SEARCH.results = [];
                    SEARCH.busy = false;
                    SEARCH.err = e.message;
                }
                renderSearchList();
            }
            function exitSearch(fromHash) {
                SEARCH = { active: false, q: "", results: null, busy: false };
                HILITE = [];
                HILITE_RE = null;
                $("findicon").textContent = "/";
                if (!fromHash) writeHash();
                renderRail();
            }
            function renderSearchList() {
                $("chips").style.display = "none";
                const list = $("list");
                const kw = SEARCH.mode === "keyword";
                const label = kw ? "exact match" : C("searchHead");
                let head = `<div class="grp"><span>${label} · "${esc(SEARCH.q)}"</span><b id="searchback" style="cursor:pointer;color:var(--ember)">${C("searchExit")}</b></div>`;
                if (SEARCH.busy) {
                    list.innerHTML =
                        head +
                        `<div class="empty"><span class="spin">${C("searchBusy")}</span></div>`;
                    wireSearchBack();
                    return;
                }
                const r = SEARCH.results || [];
                if (!r.length) {
                    list.innerHTML =
                        head +
                        `<div class="empty">${SEARCH.err ? C("searchWarm") : C("searchEmpty")}</div>`;
                    wireSearchBack();
                    return;
                }
                if (kw) {
                    // one row per matching turn/reply (every instance, like grep), grouped under its chat
                    const tot = SEARCH.total || r.length,
                        nc = SEARCH.chats || 1;
                    let html = `<div class="grp"><span>${tot} match${tot == 1 ? "" : "es"} in ${nc} chat${nc == 1 ? "" : "s"} · "${esc(SEARCH.q)}"</span><b id="searchback" style="cursor:pointer;color:var(--ember)">${C("searchExit")}</b></div>`;
                    let lastSes = null;
                    r.forEach((h) => {
                        if (h.session !== lastSes) {
                            lastSes = h.session;
                            const row = bySession[h.session];
                            const head = row
                                ? chatTitle(row)
                                : `${h.agent} · ${dirOf(h)}`;
                            html += `<div class="grp ksub"><span>${esc(head)}</span><b class="when">${esc(h.agent)}</b></div>`;
                        }
                        const when = ago(h.ts);
                        html += `<div class="ci hit" data-s="${esc(h.session)}">
        <div class="ttl snip"><span class="who ${h.who === "you" ? "you" : ""}">${h.who}</span>${hl(h.snippet, HILITE)}</div>
        <div class="mt"><span class="pj">turn ${h.turn}</span>${when ? `<span class="when">${when}</span>` : ""}</div></div>`;
                    });
                    if (tot > r.length)
                        html += `<div class="empty" style="padding:9px">showing first ${r.length} of ${tot}</div>`;
                    list.innerHTML = html;
                    list.querySelectorAll(".ci[data-s]").forEach(
                        (el) => (el.onclick = () => openChat(el.dataset.s)),
                    );
                    wireSearchBack();
                    return;
                }
                // semantic: hits now carry their session id (and title) directly; fall back to the
                // summary-head match only for results from an older index.
                list.innerHTML =
                    head +
                    r
                        .map((c, i) => {
                            const ses =
                                c.session || (findRow(c) || {}).session || null;
                            const row = ses ? bySession[ses] : null;
                            const ttl = chatTitle({
                                title: c.title,
                                summary: c.summary,
                                tags: c.tags || [],
                            });
                            const heat =
                                row && row.has_vibe
                                    ? `<span style="color:${heatColor((row.juice || 0) / 12)}">vibe ${row.juice.toFixed(1)}</span> · `
                                    : "";
                            const when = row ? ago(row.last_ts) : "";
                            return `<div class="ci${ses ? "" : " nohit"}" data-s="${esc(ses || "")}" ${ses ? "" : 'style="cursor:default;opacity:.78"'}>
      <div class="ttl">${hl(ttl, HILITE)}</div>
      <div class="mt"><span class="dot" style="background:#2a2f37"></span>
        <span class="ag">${esc(c.agent)}</span><span class="pj">${esc(dirOf(c))}</span>
        <span class="heat">${heat}${c.n_msgs ? fmt(c.n_msgs) + "t" : ""}${when ? ` · <span class="when">${when}</span>` : ""}</span></div></div>`;
                        })
                        .join("");
                list.querySelectorAll(".ci[data-s]:not(.nohit)").forEach(
                    (el) => {
                        if (el.dataset.s)
                            el.onclick = () => openChat(el.dataset.s);
                    },
                );
                wireSearchBack();
            }
            function wireSearchBack() {
                const b = $("searchback");
                if (b) b.onclick = () => exitSearch();
            }

            // ---- url state: #chat=<id> &/or #q=<query>, or #view=pulse ----
            // written on commit-level actions (open chat, Enter-search, view switch), so refresh
            // restores the screen and back/forward walk through chats. Live keystrokes don't spam it.
            let HASHME = "";
            function writeHash() {
                const parts = [];
                if (STATE.view === "pulse") parts.push("view=pulse");
                else if (STATE.view === "live") parts.push("view=live");
                else {
                    if (SEARCH.active && SEARCH.q)
                        parts.push(
                            "q=" +
                                encodeURIComponent(
                                    SEARCH.mode === "keyword"
                                        ? '"' + SEARCH.q + '"'
                                        : SEARCH.q,
                                ),
                        );
                    if (STATE.sel)
                        parts.push("chat=" + encodeURIComponent(STATE.sel));
                }
                const h = parts.length ? "#" + parts.join("&") : "";
                if (location.hash === h) return;
                HASHME = h;
                if (h) location.hash = h;
                else
                    history.pushState(
                        null,
                        "",
                        location.pathname + location.search,
                    );
            }
            function applyHash() {
                const p = new URLSearchParams(location.hash.replace(/^#/, ""));
                if (p.get("view") === "pulse") {
                    setView("pulse", true);
                    return;
                }
                if (p.get("view") === "live") {
                    setView("live", true);
                    return;
                }
                if (STATE.view !== "explore") showExplore();
                const q = p.get("q") || "";
                if (q) {
                    $("find").value = q;
                    $("findx").style.display = "";
                    runSearch(q, true);
                } else if (SEARCH.active) {
                    $("find").value = "";
                    $("findx").style.display = "none";
                    exitSearch(true);
                }
                const c = p.get("chat");
                if (c) openChat(c, true);
                else if (!q) {
                    STATE.sel = null;
                    $("view").innerHTML = "";
                    showPlaceholder();
                    renderRail();
                }
            }
            window.addEventListener("hashchange", () => {
                if (location.hash !== HASHME) {
                    applyHash();
                }
                HASHME = location.hash;
            });
            function findRow(c) {
                // match a search result to a chat row (same agent+project+summary head)
                if (c.session && bySession[c.session])
                    return bySession[c.session];
                const head = (c.summary || "").slice(0, 60);
                return (
                    CHATS.find(
                        (x) =>
                            x.agent === c.agent &&
                            x.project === c.project &&
                            (x.summary || "").slice(0, 60) === head,
                    ) || null
                );
            }

            function renderRail() {
                if (SEARCH.active) {
                    renderSearchList();
                    return;
                }
                // fresh install: nothing indexed at all is a different situation than a filter
                // matching nothing — say what to run, not "loosen the filter"
                if (!CHATS.length) {
                    $("list").innerHTML =
                        `<div class="empty">${C("emptyZero")}</div>`;
                    return;
                }
                renderChips();
                let rows = CHATS.filter((c) => matches(c, STATE.filter));
                if (STATE.chip != null)
                    rows = rows.filter((c) => groupKey(c) === STATE.chip);
                const sortFn =
                    STATE.sort === "heat"
                        ? (a, b) => (b.juice || 0) - (a.juice || 0)
                        : STATE.sort === "recent"
                          ? (a, b) => (b.last_ts || 0) - (a.last_ts || 0)
                          : (a, b) => b.n_msgs - a.n_msgs;
                const list = $("list");
                if (!rows.length) {
                    list.innerHTML = `<div class="empty">${C("emptyNoMatch")}</div>`;
                    return;
                }
                let html = "";
                if (STATE.group === "none") {
                    html = rows.sort(sortFn).map(ciHTML).join("");
                } else {
                    const groups = {};
                    rows.forEach((c) => {
                        (groups[groupKey(c)] = groups[groupKey(c)] || []).push(
                            c,
                        );
                    });
                    const keys =
                        STATE.group === "date"
                            ? DBUCKETS.filter((k) => groups[k])
                            : Object.keys(groups).sort(
                                  (a, b) => groups[b].length - groups[a].length,
                              );
                    for (const k of keys) {
                        const g = groups[k].sort(sortFn);
                        const lab =
                            STATE.group === "concept"
                                ? shortConcept(k)
                                : STATE.group === "date"
                                  ? C(k)
                                  : k;
                        html +=
                            `<div class="grp"><span>${esc(lab)}</span><b>${g.length}</b></div>` +
                            g.map(ciHTML).join("");
                    }
                }
                list.innerHTML = html;
                list.querySelectorAll(".ci").forEach(
                    (el) => (el.onclick = () => openChat(el.dataset.s)),
                );
                if (STATE.sel)
                    list.querySelector(
                        `.ci[data-s="${cssEsc(STATE.sel)}"]`,
                    )?.classList.add("sel");
            }
            function cssEsc(s) {
                return String(s).replace(/["\\]/g, "\\$&");
            }
            function ciHTML(c) {
                const heat = c.juice ? c.juice.toFixed(1) : "";
                const col = c.has_vibe
                    ? heatColor((c.juice || 0) / 12)
                    : "#2a2f37";
                const when = ago(c.last_ts);
                const liveNow = c.live_ts && Date.now() - c.live_ts < 90000;
                return `<div class="ci${STATE.sel === c.session ? " sel" : ""}${c.thin ? " thin" : ""}" data-s="${esc(c.session)}">
    <div class="ttl">${esc(chatTitle(c))}</div>
    <div class="mt">
      <span class="dot" style="background:${col}"></span>
      <span class="ag">${esc(c.agent)}</span><span class="pj">${esc(dirOf(c))}</span>
      <span class="heat">${c.has_vibe ? `<span style="color:${heatColor((c.juice || 0) / 12)}">vibe ${heat}</span> · ` : ""}${fmt(c.n_msgs)}t${when ? ` · <span class="when">${when}</span>` : ""}</span>
      ${liveNow ? `<span class="ldot" title="${C("vLive")}"></span>` : ""}
    </div></div>`;
            }

            // ============================ chat detail ============================
            let CHATREQ = 0; // guards against a slow request being overwritten by a newer click
            let LASTD = null; // last opened chat detail, so theme swaps re-render without a refetch

            // Hover-to-prefetch: hovering a chat row kicks off its /chat fetch (deduped + cached)
            // so the click renders from memory instead of waiting on the network. The cache holds
            // the in-flight promise, so a hover already underway is reused by the click.
            const CHATCACHE = new Map(); // session -> Promise<detail>
            function fetchChat(session) {
                let p = CHATCACHE.get(session);
                if (p) return p;
                p = J("/chat?session=" + encodeURIComponent(session)).catch(
                    (e) => {
                        CHATCACHE.delete(session);
                        throw e;
                    },
                );
                CHATCACHE.set(session, p);
                if (CHATCACHE.size > 40)
                    CHATCACHE.delete(CHATCACHE.keys().next().value); // bound memory
                return p;
            }
            async function openChat(session, fromHash) {
                const lo = bySession[session];
                if (lo && lo.live_only) {
                    // not indexed yet: the live view IS its transcript
                    LIVE.sel = lo.agent + ":" + session;
                    setView("live");
                    return;
                }
                STATE.sel = session;
                if (STATE.view !== "pulse") showExplore(); // ensure explore chrome is on (no setView recursion)
                if (!fromHash) writeHash();
                $("list")
                    .querySelectorAll(".ci")
                    .forEach((el) =>
                        el.classList.toggle("sel", el.dataset.s === session),
                    );
                const cached = CHATCACHE.has(session);
                const v = $("view");
                if (!cached)
                    v.innerHTML = `<div class="spin" style="padding:40px 0">${C("opening")}</div>`; // prefetched => no flash
                $("main").scrollTop = 0;
                const my = ++CHATREQ;
                let d;
                try {
                    d = await fetchChat(session);
                } catch (e) {
                    if (my === CHATREQ)
                        v.innerHTML = `<div class="empty">${C("chatErr")} (${esc(e.message)})</div>`;
                    return;
                }
                if (my !== CHATREQ) return; // a newer chat was opened; drop this stale render
                LASTD = d;
                v.innerHTML = detailHTML(d);
                wireDetail(d);
            }
            function detailHTML(d) {
                const arc = d.vibe ? arcBlock(d.vibe) : "";
                const span =
                    d.first_ts &&
                    d.last_ts &&
                    ago(d.first_ts) !== ago(d.last_ts)
                        ? `${ago(d.first_ts)} → ${ago(d.last_ts)}`
                        : ago(d.last_ts);
                const mdls = (
                    d.models && d.models.length
                        ? d.models
                        : d.model
                          ? [{ name: d.model }]
                          : []
                )
                    .map(
                        (m) =>
                            `<span class="mdl" ${m.n ? `title="${m.n} ${C("turnsWord")}"` : ""}>${esc(prettyModel(m.name))}</span>`,
                    )
                    .join("");
                const pj = dirOf(d); // never a bare home dir; falls back to the concept thread
                const crumb = `<div class="crumb">
    <span class="ag">${esc(d.agent)}</span>
    ${mdls}
    <span class="pj">${esc(pj || "·")}</span>
    ${d.concept && shortConcept(d.concept) !== pj ? `<span class="cc">${esc(shortConcept(d.concept))}</span>` : ""}
    <span>${fmt(d.n_msgs)} ${C("turnsWord")}</span>
    ${span ? `<span class="when">${span}</span>` : ""}
    <span style="color:${heatColor((d.hot_pct / 100) * 0.45)}">${d.hot_pct}% ${C("hotWord")}</span>
    <button class="resumebtn" data-ag="${esc(d.agent)}" data-se="${esc(d.session)}">${C("detResume")}</button>
  </div>`;
                const tags = d.tags.length
                    ? `<div class="tags">${d.tags.map((t) => `<span class="tag">${esc(t)}</span>`).join("")}</div>`
                    : "";
                const sum = d.summary
                    ? `<div class="sum">${esc(d.summary)}</div>`
                    : "";
                return `<div class="det">
    <h2>${esc(chatTitle(d))}</h2>
    ${crumb}${sum}${tags}${arc}
    <div class="tx" id="tx"></div>
  </div>`;
            }
            function arcBlock(t) {
                return `<div class="arc">
    <div class="ah">
      <div class="verdict"><span class="m">&rsaquo;</span> ${esc(t.verdict || C("arcDefault"))}</div>
      <div class="ameta">${t.n_turns} ${C("turnsWord")} · ${C("peakWord")} @ ${t.peak_turn}</div>
    </div>
    ${arcSVG(t)}
    <div class="legend">
      <span class="sw" style="background:var(--ember)"></span><span>${C("arcRage")}</span>
      <span class="sw" style="background:var(--calm)"></span><span>${C("arcHype")}</span>
      <span style="margin-left:auto;color:var(--ghost)">${C("arcClick")}</span>
    </div>
    ${tpList(t)}
  </div>`;
            }
            // the moments under the chart: every turning point + the peak, each shown as the actual
            // message — the quote IS the label. Clicking a row (or its dot on the chart) jumps to
            // that turn in the transcript.
            function tpList(t) {
                const tps = t.turning_points || [];
                const snips = t.snippets || [];
                const rows = tps.map((tp, j) => ({
                    turn: tp,
                    mark: String(j + 1),
                }));
                // the peak is the headline moment; give it a row unless it's already a turning point
                if (Number.isInteger(t.peak_turn) && !tps.includes(t.peak_turn))
                    rows.push({ turn: t.peak_turn, mark: "◉", peak: true });
                rows.sort((a, b) => a.turn - b.turn);
                if (!rows.length) return "";
                const items = rows
                    .map((r) => {
                        const q = snips[r.turn] || "";
                        return `<li class="tpjump${r.peak ? " pk" : ""}" data-turn="${r.turn}">
      <b>${r.mark}</b><span class="tpt">${C("tpTurn")} ${r.turn}</span>
      <span class="tpq">${q ? `<span class="tpm">&ldquo;${esc(q)}&rdquo;</span>` : ""}</span>
    </li>`;
                    })
                    .join("");
                return `<ol class="tps">${items}</ol>`;
            }
            // the mood chart: two intensity series rising from the floor — frustration (ember) and
            // hype (calm). No inverted axis, no abstract "valence": red mountain = mad, teal
            // mountain = stoked. Every turn is hoverable (message snippet) and clickable (jumps to
            // that turn in the transcript below).
            function arcSVG(t) {
                const W = 820,
                    H = 190,
                    pad = 30,
                    bot = H - 28,
                    topy = 22,
                    n = (t.rage || []).length;
                if (!n) return "";
                const rage = t.rage,
                    hype = t.valence.map((v, i) => Math.max(0, v + rage[i]));
                const ymax = Math.max(0.6, ...rage, ...hype);
                const X = (i) => pad + (i * (W - 2 * pad)) / Math.max(1, n - 1),
                    Y = (v) => bot - (Math.max(0, v) / ymax) * (bot - topy);
                const path = (arr) => {
                    let d = "";
                    arr.forEach(
                        (v, i) =>
                            (d +=
                                (i ? "L" : "M") +
                                X(i).toFixed(1) +
                                "," +
                                Y(v).toFixed(1) +
                                " "),
                    );
                    return d;
                };
                const area = (arr) =>
                    path(arr) +
                    `L${X(n - 1).toFixed(1)},${bot} L${X(0).toFixed(1)},${bot} Z`;
                const snips = t.snippets || [];
                // invisible per-turn hit strips: hover = snippet tooltip, click = jump to the turn
                const step = (W - 2 * pad) / Math.max(1, n - 1);
                const hits = Array.from({ length: n }, (_, i) => {
                    const tip = `${C("tpTurn")} ${i}${snips[i] ? ` — ${snips[i]}` : ""}`;
                    return `<rect class="archit" data-turn="${i}" x="${(X(i) - step / 2).toFixed(1)}" y="0" width="${step.toFixed(2)}" height="${H}" fill="transparent"><title>${esc(tip)}</title></rect>`;
                }).join("");
                const tps = (t.turning_points || [])
                    .map((tp, j) => {
                        if (tp >= n) return "";
                        const x = X(tp).toFixed(1),
                            y = Y(Math.max(rage[tp], hype[tp])).toFixed(1);
                        return (
                            `<line x1="${x}" y1="${topy - 6}" x2="${x}" y2="${bot}" stroke="var(--ghost)" stroke-dasharray="2 3" opacity=".55"/>` +
                            `<circle class="tpdot" data-turn="${tp}" cx="${x}" cy="${y}" r="7.5" fill="var(--ember)"/>` +
                            `<text class="tp-num" x="${x}" y="${y}" text-anchor="middle" dy="3.3" pointer-events="none">${j + 1}</text>`
                        );
                    })
                    .join("");
                const pk = t.peak_turn < n ? t.peak_turn : 0;
                const peak = `<circle cx="${X(pk).toFixed(1)}" cy="${Y(rage[pk]).toFixed(1)}" r="4.5" fill="none" stroke="var(--hot)" stroke-width="1.6"/>`;
                return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${bot}" x2="${W - pad}" y2="${bot}" stroke="var(--hair)"/>
    <path d="${area(rage)}" fill="var(--ember)" opacity=".16"/>
    <path d="${area(hype)}" fill="var(--calm)" opacity=".16"/>
    <path d="${path(rage)}" fill="none" stroke="var(--ember)" stroke-width="1.6" opacity=".9"/>
    <path d="${path(hype)}" fill="none" stroke="var(--calm)" stroke-width="1.6"/>
    ${tps}${peak}${hits}
    <text class="axislab" x="${pad}" y="${H - 3}">${C("tpTurn")} 0</text>
    <text class="axislab" x="${W - pad}" y="${H - 3}" text-anchor="end">${C("tpTurn")} ${n - 1}</text></svg>`;
            }
            // jump from the chart / turning-point list into the transcript at a given turn
            function jumpToTurn(turn) {
                turn = +turn;
                if (TXSTATE.onlyHot) TXSTATE.onlyHot = false;
                TXSTATE.shown = Math.max(TXSTATE.shown, turn + 8);
                renderTx();
                const el =
                    $("tx") && $("tx").querySelector(`.turn[data-i="${turn}"]`);
                if (el) {
                    el.scrollIntoView({ block: "center" });
                    el.classList.add("mfocus");
                    setTimeout(() => el.classList.remove("mfocus"), 1800);
                }
            }
            let TXSTATE = { turns: [], shown: 0, onlyHot: false };
            // per-chat tool/subagent events, fetched lazily and bucketed onto turns by timestamp:
            // an event belongs to the latest turn whose ts <= event ts (i.e. the turn it answers).
            let EVDATA = null; // {agent,session,byTurn:{turn:[ev,...]},n,errs}
            async function loadEvents(d) {
                EVDATA = null;
                if (!d.has_events || !d.agent) return;
                let evs;
                try {
                    evs =
                        (
                            await J(
                                `/events?agent=${encodeURIComponent(d.agent)}&session=${encodeURIComponent(d.session)}`,
                            )
                        ).events || [];
                } catch (e) {
                    return;
                }
                if (!evs.length) return;
                const turns = [...d.turns]
                    .sort((a, b) => (a.ts || 0) - (b.ts || 0))
                    .filter((t) => t.ts);
                const byTurn = {};
                let errs = 0;
                for (const e of evs) {
                    let owner = turns.length ? turns[0].turn : 0;
                    for (const t of turns) {
                        if (t.ts <= e.ts) owner = t.turn;
                        else break;
                    }
                    (byTurn[owner] = byTurn[owner] || []).push(e);
                    if (e.ok === false) errs++;
                }
                EVDATA = {
                    agent: d.agent,
                    session: d.session,
                    byTurn,
                    n: evs.length,
                    errs,
                };
                // chip in the crumb + re-render the transcript with the trees in place
                const crumb = document.querySelector(".det .crumb");
                if (crumb && !crumb.querySelector(".evn"))
                    crumb.insertAdjacentHTML(
                        "beforeend",
                        `<span class="evn">${fmt(EVDATA.n)} ${C("evWord")}${errs ? ` · <span style="color:var(--ember)">${errs} ${C("evErrWord")}</span>` : ""}</span>`,
                    );
                renderTx();
            }
            function wireDetail(d) {
                TXSTATE = {
                    turns: d.turns,
                    shown: 0,
                    onlyHot: false,
                    mi: 0,
                    peak: d.vibe ? d.vibe.peak_turn : -1,
                };
                // with a search active, render enough turns to include the first match, then jump to it
                if (HILITE.length) {
                    const hit = d.turns.findIndex(
                        (t) => matchesHi(t.text) || matchesHi(t.reply || ""),
                    );
                    if (hit >= 0) TXSTATE.shown = hit + 6;
                }
                renderTx();
                loadEvents(d);
                const rb = document.querySelector(".det .crumb .resumebtn");
                if (rb) rb.onclick = () => nativeResume(rb);
                // mood chart + turning-point list jump into the transcript
                document
                    .querySelectorAll(".archit,.tpdot,.tpjump")
                    .forEach(
                        (el) =>
                            (el.onclick = () => jumpToTurn(el.dataset.turn)),
                    );
                if (HILITE.length) {
                    const mk = $("tx") && $("tx").querySelector("mark");
                    if (mk) mk.scrollIntoView({ block: "center" });
                }
            }
            function renderTx() {
                const box = $("tx");
                if (!box) return;
                const all = TXSTATE.onlyHot
                    ? TXSTATE.turns.filter((t) => t.hot)
                    : TXSTATE.turns;
                // indices (into `all`) of turns whose text or reply matches the active search
                const mts = HILITE_RE
                    ? all
                          .map((t, i) =>
                              matchesHi(t.text) || matchesHi(t.reply || "")
                                  ? i
                                  : -1,
                          )
                          .filter((i) => i >= 0)
                    : [];
                TXSTATE.matches = mts;
                if (!Number.isInteger(TXSTATE.mi) || TXSTATE.mi >= mts.length)
                    TXSTATE.mi = 0;
                const step = 80;
                TXSTATE.shown = Math.max(
                    TXSTATE.shown,
                    Math.min(step, all.length),
                );
                if (mts.length)
                    TXSTATE.shown = Math.max(
                        TXSTATE.shown,
                        mts[TXSTATE.mi] + 1,
                    );
                const slice = all.slice(0, TXSTATE.shown);
                const mpill = mts.length
                    ? `<span class="mnav"><button id="mprev" title="previous match (N)">‹</button><b>${TXSTATE.mi + 1}/${mts.length}</b><button id="mnext" title="next match (n)">›</button><span class="keyhint">n/N</span></span>`
                    : "";
                const head = `<div class="txhead">
    <span>${C("txHead")} · ${all.length} ${C("txYours")}${TXSTATE.onlyHot ? " (" + C("txHot").toLowerCase() + " only)" : ""}</span>
    ${mpill}
    <div class="seg"><button data-h="0" class="${TXSTATE.onlyHot ? "" : "on"}">${C("txAll")}</button><button data-h="1" class="${TXSTATE.onlyHot ? "on" : ""}">${C("txHot")}</button></div>
  </div>`;
                const cur = mts.length ? mts[TXSTATE.mi] : -1;
                const rows = slice
                    .map((t, i) => {
                        const col = heatColor(t.rage);
                        const cls =
                            "turn" +
                            (t.hot ? " h" : "") +
                            (i === cur ? " mfocus" : "");
                        const tg = (t.top || [])
                            .slice(0, 3)
                            .filter((x) => x !== "neutral")
                            .join(", ");
                        const mdl = t.model
                            ? ` · ${esc(prettyModel(t.model))}`
                            : "";
                        const replyHit = t.reply && matchesHi(t.reply); // auto-open a reply that contains a match
                        const rtog = t.reply
                            ? `<button class="rtog" data-t="${t.turn}" aria-expanded="${replyHit}">${C("replyLabel")}${mdl}</button>`
                            : "";
                        const rbox = t.reply
                            ? `<div class="rep md" id="rep${t.turn}" ${replyHit ? "" : "hidden"}>${HILITE_RE ? hl(t.reply, HILITE) : mdHTML(t.reply)}</div>`
                            : "";
                        const tag = t.recap
                            ? `<span class="recaptag">recap</span> `
                            : ""; // auto-generated compaction summary, not your words
                        const evs = EVDATA && EVDATA.byTurn[t.turn];
                        const everr = evs
                            ? evs.filter((e) => e.ok === false).length
                            : 0;
                        const evb = evs
                            ? `<button class="evtog" data-t="${t.turn}" aria-expanded="false">⚒ ${evs.length} ${C("evWord")}${everr ? ` · <span class="bad">${everr} ${C("evErrWord")}</span>` : ""}</button><div class="evtree" id="evt${t.turn}" hidden></div>`
                            : "";
                        return `<div class="${cls}${t.recap ? " recap" : ""}" data-i="${i}">
      <div class="n">${t.turn}<i style="background:${t.rage > 0.05 ? col : "transparent"}"></i></div>
      <div><div class="tt">${tag}${hl(t.text, HILITE)}</div>${tg ? `<div class="tg">${esc(tg)}</div>` : ""}${evb}${rtog}${rbox}</div>
    </div>`;
                    })
                    .join("");
                const more =
                    TXSTATE.shown < all.length
                        ? `<button class="more" id="more">${C("txShow")} ${Math.min(step, all.length - TXSTATE.shown)} ${C("txMore")} · ${all.length - TXSTATE.shown} ${C("txLeft")}</button>`
                        : "";
                box.innerHTML = head + rows + more;
                box.querySelectorAll(".txhead .seg button").forEach(
                    (b) =>
                        (b.onclick = () => {
                            TXSTATE.onlyHot = b.dataset.h === "1";
                            TXSTATE.shown = 0;
                            TXSTATE.mi = 0;
                            renderTx();
                        }),
                );
                box.querySelectorAll(".rtog").forEach(
                    (b) =>
                        (b.onclick = () => {
                            const el = $("rep" + b.dataset.t);
                            if (!el) return;
                            const willOpen = el.hidden;
                            el.hidden = !willOpen;
                            b.setAttribute(
                                "aria-expanded",
                                willOpen ? "true" : "false",
                            );
                        }),
                );
                const mp = $("mprev"),
                    mn = $("mnext");
                if (mp) mp.onclick = () => txMatchNav(-1);
                if (mn) mn.onclick = () => txMatchNav(1);
                const m = $("more");
                if (m)
                    m.onclick = () => {
                        TXSTATE.shown += 80;
                        renderTx();
                    };
                box.querySelectorAll(".evtog").forEach(
                    (b) =>
                        (b.onclick = () => {
                            const el = $("evt" + b.dataset.t);
                            if (!el) return;
                            if (el.hidden && !el.dataset.built) {
                                el.innerHTML = evTreeHTML(
                                    EVDATA.byTurn[b.dataset.t] || [],
                                );
                                el.dataset.built = "1";
                                wireEvTree(el);
                            }
                            el.hidden = !el.hidden;
                            b.setAttribute(
                                "aria-expanded",
                                el.hidden ? "false" : "true",
                            );
                        }),
                );
            }

            // ---- the event tree inside a turn: runs of the same tool collapse to one row, errors
            // always stay visible, every row expands to its capped input/output, and "full" pulls
            // the uncapped payload straight from the agent's own store (/event_raw).
            function evTreeHTML(evs) {
                let html = "",
                    i = 0;
                while (i < evs.length) {
                    let j = i;
                    while (
                        j < evs.length &&
                        evs[j].name === evs[i].name &&
                        evs[j].kind === "tool" &&
                        evs[j].ok !== false
                    )
                        j++;
                    const run = j - i;
                    if (run >= 4) {
                        html += `<div class="evgrp" data-a="${i}" data-b="${j}" aria-expanded="false">⚒ ${esc(evs[i].name)} ×${run}</div><div class="evgrpbody" hidden data-a="${i}" data-b="${j}"></div>`;
                        i = j;
                    } else {
                        html += evRowHTML(evs[i], i);
                        i++;
                    }
                }
                return html;
            }
            function evRowHTML(e, idx) {
                const sub = e.kind && e.kind.startsWith("subagent");
                const ic = sub ? "⑂" : "⚒";
                const err = e.ok === false;
                const okm =
                    e.ok == null
                        ? ""
                        : err
                          ? `<span class="ok bad">✗</span>`
                          : `<span class="ok">✓</span>`;
                return `<div class="ev${err ? " err" : ""}${sub ? " sub" : ""}" data-i="${idx}">
    <span class="ic">${ic}</span>
    <span class="bd" style="display:flex;gap:8px;min-width:0"><span class="nm">${esc(e.name || "?")}</span><span class="in">${esc(e.input || e.output || "")}</span></span>
    ${okm}</div>`;
            }
            function wireEvTree(root) {
                const evs = () => EVDATA.byTurn[root.id.slice(3)] || [];
                root.querySelectorAll(".evgrp").forEach(
                    (g) =>
                        (g.onclick = () => {
                            const body = root.querySelector(
                                `.evgrpbody[data-a="${g.dataset.a}"]`,
                            );
                            if (body.hidden && !body.dataset.built) {
                                const list = evs().slice(
                                    +g.dataset.a,
                                    +g.dataset.b,
                                );
                                body.innerHTML = list
                                    .map((e, k) =>
                                        evRowHTML(e, +g.dataset.a + k),
                                    )
                                    .join("");
                                body.dataset.built = "1";
                                wireEvRows(body, evs);
                            }
                            body.hidden = !body.hidden;
                            g.setAttribute(
                                "aria-expanded",
                                body.hidden ? "false" : "true",
                            );
                        }),
                );
                wireEvRows(root, evs);
            }
            function wireEvRows(scope, evs) {
                scope.querySelectorAll(".ev").forEach(
                    (r) =>
                        (r.onclick = (ev) => {
                            ev.stopPropagation();
                            let x = r.nextElementSibling;
                            if (x && x.classList.contains("evx")) {
                                x.remove();
                                return;
                            }
                            const e = evs()[+r.dataset.i];
                            if (!e) return;
                            r.insertAdjacentHTML(
                                "afterend",
                                `<div class="evx">
      ${e.input ? `<div class="lbl">${C("evIn")}</div><pre>${esc(e.input)}</pre>` : ""}
      ${e.output ? `<div class="lbl">${C("evOut")} ${e.ok === false ? `<span style="color:var(--ember)">✗</span>` : ""}</div><pre>${esc(e.output)}</pre>` : ""}
      ${e.child ? `<button class="full" data-child="${esc(e.child)}">${C("evChild")}</button> ` : ""}
      ${e.call_id ? `<button class="full" data-cid="${esc(e.call_id)}">${C("evFull")}</button>` : ""}
    </div>`,
                            );
                            const x2 = r.nextElementSibling;
                            x2.onclick = (ev2) => ev2.stopPropagation();
                            const fb = x2.querySelector(".full[data-cid]");
                            if (fb)
                                fb.onclick = async () => {
                                    fb.disabled = true;
                                    fb.textContent = C("evFetching");
                                    try {
                                        const raw = await J(
                                            `/event_raw?agent=${encodeURIComponent(EVDATA.agent)}&session=${encodeURIComponent(EVDATA.session)}&call_id=${encodeURIComponent(fb.dataset.cid)}`,
                                        );
                                        x2.innerHTML = `${raw.input ? `<div class="lbl">${C("evIn")}</div><pre>${esc(raw.input)}</pre>` : ""}
          ${raw.output ? `<div class="lbl">${C("evOut")}</div><pre>${esc(raw.output)}</pre>` : ""}
          ${raw.error ? `<div class="lbl" style="color:var(--ember)">${esc(raw.error)}</div>` : ""}`;
                                        x2.onclick = (ev2) =>
                                            ev2.stopPropagation();
                                    } catch (err) {
                                        fb.textContent = C("evFullErr");
                                        fb.disabled = false;
                                    }
                                };
                            const cb = x2.querySelector(".full[data-child]");
                            if (cb)
                                cb.onclick = () => {
                                    setView("explore");
                                    openChat(cb.dataset.child);
                                };
                        }),
                );
            }
            function txMatchNav(d) {
                const mts = TXSTATE.matches || [];
                if (!mts.length) return;
                TXSTATE.mi = (TXSTATE.mi + d + mts.length) % mts.length;
                renderTx();
                const el = $("tx") && $("tx").querySelector(".turn.mfocus");
                if (el) el.scrollIntoView({ block: "center" });
            }

            // The bundled "ask agent" (Gemma over top-k hits) was cut: search shows receipts and is
            // instant; cross-chat synthesis belongs to a real agent pointed at this server's endpoints.

            // ============================ pulse (dashboard) ============================
            let DASH = null;
            async function renderPulse() {
                const v = $("view");
                if (!DASH) {
                    if (window.__pre && window.__pre.data) {
                        try {
                            DASH = await window.__pre.data;
                        } catch (e) {}
                    }
                    if (!DASH) {
                        v.innerHTML = `<div class="spin" style="padding:40px 0">${C("loadingStats")}</div>`;
                        try {
                            DASH = await J("/data");
                        } catch (e) {
                            v.innerHTML = `<div class="empty">${C("noStats")} (${esc(e.message)})</div>`;
                            return;
                        }
                    }
                }
                const D = DASH,
                    E = D.events || {},
                    BA = E.by_agent || {};
                // affect data is the optional GPU tier — a stdlib-only install has none, and dead
                // "0% hot" cards would just look broken. Hide the affect surfaces instead.
                const hasAffect =
                    (D.vibe_top || []).length > 0 ||
                    (D.overall_hot || 0) > 0 ||
                    (D.agents || []).some((a) => (a.hot_pct || 0) > 0);
                // ---- vitals strip
                const nAgents = Object.keys(BA).length || D.agents.length;
                const vit = [
                    [fmt(STATS ? STATS.n_msgs : D.total), C("pvTurns")],
                    [fmt(E.total || 0), C("pvCalls")],
                    ...(hasAffect
                        ? [[(D.overall_hot || 0) + "%", C("pvHot")]]
                        : []),
                    [nAgents, C("pvAgents")],
                    [fmt(E.subagents || 0), C("pvSubs")],
                ];
                // ---- reliability: only stores that RECORD outcomes get a rate; codex logs raw
                // text with no exit status, so it reads "not recorded" instead of a fake 0%.
                // a rate needs real coverage: >=200 recorded outcomes AND outcomes for most calls
                // (codex records status on only ~8% of its calls — that's "not recorded", not 0%)
                const rel = Object.entries(BA)
                    .map(([name, a]) => ({
                        name,
                        calls: a.calls,
                        rate:
                            a.known >= 200 && a.known / a.calls >= 0.5
                                ? +((a.fails / a.known) * 100).toFixed(1)
                                : null,
                        fails: a.fails,
                    }))
                    .sort((x, y) => (y.rate ?? -1) - (x.rate ?? -1));
                const relMax = Math.max(1, ...rel.map((r) => r.rate || 0));
                const relRows = rel
                    .map((r) =>
                        r.rate == null
                            ? `<div class="prow"><div class="nm">${esc(r.name)}</div><div class="pna">${C("relNA")}</div><div class="v">${fmt(r.calls)}</div></div>`
                            : `<div class="prow"><div class="nm">${esc(r.name)}</div><div class="pb"><i style="width:${((r.rate / relMax) * 100).toFixed(1)}%;background:${heatColor((r.rate / 100) * 0.5)}"></i></div><div class="v"><b>${r.rate}%</b> · ${fmt(r.calls)}</div></div>`,
                    )
                    .join("");
                // ---- tool mix
                const tools = (E.by_tool || []).slice(0, 10);
                const tMax = Math.max(1, ...tools.map((t) => t.n));
                const toolRows = tools
                    .map(
                        (
                            t,
                        ) => `<div class="prow"><div class="nm" title="${esc(t.name)}">${esc(t.name)}</div>
    <div class="pb"><i style="width:${((t.n / tMax) * 100).toFixed(1)}%"></i></div>
    <div class="v"><b>${fmt(t.n)}</b>${t.fails ? ` · <span style="color:var(--ember)">${fmt(t.fails)}✗</span>` : ""}</div></div>`,
                    )
                    .join("");
                // ---- hottest sessions leaderboard (click -> open the chat)
                const leadRows = (D.vibe_top || [])
                    .map((s) => {
                        const row = bySession[s.session];
                        const ttl = row
                            ? chatTitle(row)
                            : s.verdict || s.project || s.session.slice(0, 12);
                        return `<div class="plead" data-s="${esc(s.session)}">
      <span class="pj1" style="color:${heatColor((s.juice || 0) / 12)}">${(s.juice || 0).toFixed(1)}</span>
      <span class="pt1">${esc(ttl)}</span>
      <span class="pa1">${esc(s.agent || "")}</span></div>`;
                    })
                    .join("");
                // ---- agent heat (existing metric, card-sized)
                const aMax = Math.max(1, ...D.agents.map((r) => r.hot_pct));
                const heatRows = D.agents
                    .map(
                        (
                            r,
                        ) => `<div class="prow"><div class="nm">${esc(r.name)}</div>
    <div class="pb"><i style="width:${((r.hot_pct / aMax) * 100).toFixed(1)}%;background:${heatColor((r.hot_pct / 100) * 0.45)}"></i></div>
    <div class="v"><b>${r.hot_pct}%</b> · ${fmt(r.msgs)}</div></div>`,
                    )
                    .join("");

                v.innerHTML = `
    <div class="vitals">${vit.map((x) => `<div class="vi"><b>${x[0]}</b><span>${x[1]}</span></div>`).join("")}</div>
    <div class="pgrid">
      ${hasAffect ? `<div class="pcard"><h3>${C("pcHeat")}<em>${C("pcHeatEm")}</em></h3>${heatRows || `<div class="empty">${C("notEnough")}</div>`}</div>` : ""}
      <div class="pcard"><h3>${C("pcRel")}<em>${C("pcRelEm")}</em></h3>${relRows || `<div class="empty">${C("notEnough")}</div>`}</div>
      <div class="pcard"><h3>${C("pcTools")}<em>${fmt(E.total || 0)} ${C("pvCalls")}</em></h3>${toolRows || `<div class="empty">${C("notEnough")}</div>`}</div>
      ${hasAffect ? `<div class="pcard"><h3>${C("pcHot")}<em>${C("pcHotEm")}</em></h3>${leadRows || `<div class="empty">${C("notEnough")}</div>`}</div>` : ""}
      <div class="pcard wide"><h3>${C("secTime")}<em>${C("secTimeEm")}</em></h3><div id="d_tl"></div></div>
      <div class="pcard wide"><h3>${C("secProj")}<em>${C("secProjEm")}</em></h3><div id="d_proj"></div></div>
    </div>`;
                bars($("d_proj"), D.projects);
                timeline($("d_tl"), D.timeline);
                v.querySelectorAll(".plead").forEach(
                    (el) =>
                        (el.onclick = () => {
                            setView("explore");
                            openChat(el.dataset.s);
                        }),
                );
            }
            function bars(el, rows) {
                if (!rows || !rows.length) {
                    el.innerHTML = `<div class="empty" style="padding:14px">${C("notEnough")}</div>`;
                    return;
                }
                const max = Math.max(1, ...rows.map((r) => r.hot_pct));
                el.innerHTML = rows
                    .map(
                        (r) => `<div class="row">
    <div class="nm">${esc(r.name)}${r.agent && r.agent !== r.name ? ` <small>${esc(r.agent)}</small>` : ""}</div>
    <div class="bar"><i style="width:${((r.hot_pct / max) * 100).toFixed(1)}%"></i></div>
    <div class="v"><b>${r.hot_pct}%</b> ${C("hotPctWord")} · ${fmt(r.msgs)}</div></div>`,
                    )
                    .join("");
            }
            function timeline(el, tl) {
                if (!tl || !tl.length) {
                    el.innerHTML = "";
                    return;
                }
                const W = 820,
                    H = 120,
                    pad = 24,
                    bot = H - 18;
                const max = Math.max(5, ...tl.map((t) => t.hot_pct));
                const X = (i) =>
                        pad + (i * (W - 2 * pad)) / Math.max(1, tl.length - 1),
                    Y = (v) => pad + (1 - v / max) * (bot - pad);
                let line = "";
                tl.forEach(
                    (t, i) =>
                        (line +=
                            (i ? "L" : "M") +
                            X(i).toFixed(1) +
                            "," +
                            Y(t.hot_pct).toFixed(1) +
                            " "),
                );
                const area =
                    line +
                    `L${X(tl.length - 1).toFixed(1)},${bot} L${X(0).toFixed(1)},${bot} Z`;
                el.innerHTML = `<svg class="tl" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">

            // ============================ live (passive store tailing) ============================

            const EVICON = {

            function lvIsLive(s, now) {

            function ensureStream() {

                const err = e.ok === false;

                    ? ""

                else if (e.type === "tool_done")

                else if (e.type === "subagent_result")
                    bd = `${src}<b>${esc(e.name || "task")}</b> <span class="md">${mdInline(e.output || "")}</span>`;
                else if (e.type === "reply")
                    bd = `${src}<span class="md">${mdInline(e.text || "")}</span>`;

            function lrowCozy(e) {
                const t = e.ts ? new Date(e.ts).toTimeString().slice(0, 8) : "";

                const pj = lvProj(e);
                const who = LIVE.sel

                let body = "";
                if (e.type === "tool" || e.type === "tool_done") {

                    body = `<div class="lzn">⑂ <b>${esc(e.name || "task")}</b></div><div class="lzo md">${mdInline(e.output || "")}</div>`;
