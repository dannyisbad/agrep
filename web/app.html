            // resume a session in its native CLI: POST /open_native, reflect the outcome on the button.
            async function nativeResume(btn) {
                const agent = btn.dataset.ag,
                    session = btn.dataset.se;
                const old = btn.textContent;
                btn.disabled = true;
                btn.textContent = C("liveResuming");
                try {
                    const r = await (
                        await fetch("/open_native", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ agent, session }),
                        })
                    ).json();
                    if (r.ok) {
                        btn.textContent = C("liveResumed");
                        btn.title = r.cmd + "  (" + r.cwd + ")";
                    } else {
                        btn.textContent = C("liveResumeErr");
                        btn.title = r.error || "";
                        btn.disabled = false;
                    }
                } catch (e) {
                    btn.textContent = C("liveResumeErr");
                    btn.disabled = false;
                }
                setTimeout(() => {
                    btn.textContent = old;
                    btn.disabled = false;
                    btn.title = "";
                }, 3200);
            }

            // status badge on the live button: a pulsing dot + count while agents are actually working
            async function liveBadge() {
                try {
                    const s = await J("/live/state");
                    const act = (s.sessions || []).filter((x) => x.active);
                    $("vLive").innerHTML = act.length
                        ? `${C("vLive")}<span class="ldot"></span>${act.length}`
                        : C("vLive");
                    // seed the rail overlay: sessions already running before this page loaded
                    let dirty = false;
                    act.forEach((x) => {
                        let row = bySession[x.session];
                        if (!row) {
                            const firstUser = (x.recent || []).find(
                                (e) => e.type === "user" && !e.sub,
                            );
                            row = bySession[x.session] = {
                                session: x.session,
                                agent: x.agent,
                                project:
                                    x.project && x.project !== "~"
                                        ? x.project
                                        : "",
                                concept: "",
                                n_msgs:
                                    (x.recent || []).filter(
                                        (e) => e.type === "user" && !e.sub,
                                    ).length || 1,
                                last_ts: x.last_ts || 0,
                                title:
                                    (
                                        (firstUser && firstUser.text) ||
                                        x.title ||
                                        ""
                                    ).slice(0, 90) || x.session.slice(0, 12),
                                summary: "",
                                tags: [],
                                thin: true,
                                live_only: true,
                                has_vibe: false,
                                juice: null,
                                verdict: "",
                            };

                        row.live_ts = Date.now();
                        row.last_ts = Math.max(

                        );
                    });

                    $("vLive").textContent = C("vLive");
                }
            }

            // ============================ view switching + boot ============================
            // chrome only: set the explore/live/pulse toggle + rail visibility, no content side-effects.
            function viewBtns(on) {
                ["vExplore", "vLive", "vPulse"].forEach((id) =>
                    $(id).classList.toggle("on", id === on),
                );
            }
            function showExplore() {
                if (STATE.view === "live") stopLive();
                STATE.view = "explore";
                viewBtns("vExplore");
                $("pane").classList.remove("wide", "mid");
                $("bodyEl").classList.remove("solo");
                $("rail").style.display = "";
                $("conv").style.display = "";
            }
            function setView(view, fromHash) {
                $("pane").classList.toggle("wide", view === "live");
                $("pane").classList.toggle("mid", view === "pulse");
                if (view === "pulse" || view === "live") {
                    if (STATE.view === "live" && view !== "live") stopLive();
                    STATE.view = view;
                    viewBtns(view === "pulse" ? "vPulse" : "vLive");
                    $("bodyEl").classList.add("solo");
                    $("rail").style.display = "none";
                    $("conv").style.display = "none";
                    if (!fromHash) writeHash();
                    view === "pulse" ? renderPulse() : startLive();
                } else {
                    showExplore();
                    if (!fromHash) writeHash();
                    if (STATE.sel) openChat(STATE.sel, true);
                    else showPlaceholder();

            function showPlaceholder() {

            // type = live keyword search (instant, no Enter). Enter = semantic "meaning" search.
            let liveTimer = null,
                liveReq = 0;
            async function liveKeyword(term) {
                term = term.replace(/^"|"$/g, "").trim();
                if (!term) {
                    exitSearch();
                    return;
                }
                HILITE = [term];
                HILITE_RE = buildHiRe(HILITE);
                if (!SEARCH.active || SEARCH.mode !== "keyword") {
                    $("findicon").textContent = "⌕";
                }
                SEARCH = {
                    active: true,
                    q: term,
                    results: SEARCH.results,
                    busy: true,
                    mode: "keyword",
                };
                const my = ++liveReq;
                try {
                    const o = await J(
                        "/search?mode=keyword&k=150&q=" +
                            encodeURIComponent(term),
                    );
                    if (my !== liveReq) return; // a newer keystroke superseded this
                    SEARCH = {
                        active: true,
                        q: term,
                        results: o.results || [],
                        busy: false,
                        mode: "keyword",
                        total: o.total,
                        chats: o.chats,
                    };
                    renderSearchList();
                    if (o.results && o.results[0])
                        fetchChat(o.results[0].session); // prefetch the top hit
                } catch (e) {
                    if (my === liveReq) {
                        SEARCH = {
                            active: true,
                            q: term,
                            results: [],
                            busy: false,
                            mode: "keyword",
                            err: e.message,
                        };
                        renderSearchList();
                    }
                }
            }
            $("find").addEventListener("input", (e) => {

                } // too short -> back to the organized list
                liveTimer = setTimeout(() => liveKeyword(q), 110);
            });

                if (e.key === "Enter") {

            // keyboard: "/" focus search · j/k walk the list · n/N cycle matches in the open transcript
            function listNav(d) {
                if (STATE.view !== "explore") return;
                const items = [
                    ...$("list").querySelectorAll(".ci[data-s]"),
                ].filter((el) => el.dataset.s);
                if (!items.length) return;
                let i = items.findIndex((el) => el.dataset.s === STATE.sel);
                i =
                    i < 0
                        ? d > 0
                            ? 0
                            : items.length - 1
                        : Math.max(0, Math.min(items.length - 1, i + d));
                items[i].scrollIntoView({ block: "nearest" });
                openChat(items[i].dataset.s);
            }
            document.addEventListener("keydown", (e) => {
                // ctrl/cmd+k works from anywhere, including inside inputs
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
                    e.preventDefault();
                    PKOPEN ? pkClose() : pkOpen();
                    return;
                }
                const typing = /^(INPUT|TEXTAREA)$/.test(
                    document.activeElement.tagName,
                );
                if (e.key === "/" && !typing) {
                    e.preventDefault();
                    $("find").focus();
                    return;
                }
                if (typing || e.ctrlKey || e.metaKey || e.altKey) return;
                if (e.key === "j") {
                    e.preventDefault();
                    listNav(1);
                } else if (e.key === "k") {
                    e.preventDefault();
                    listNav(-1);
                } else if (e.key === "n") {

            let STATUS_PREV = null,

                // -> {cls, busy} from the /status blob
                const idx = s.indexer || {},
                    werr =
                        idx.last_err || (s.watcher && s.watcher.last_err) || "";
                if (idx.phase === "indexing" || REIDXING)
                    return { cls: "busy", busy: true, werr };
                if (idx.phase === "error" || werr)
                    return { cls: "err", busy: false, werr };
                if (s.index_age_s == null)
                    return { cls: "warn", busy: false, werr };
                if (s.index_age_s > 86400)
                    return { cls: "warn", busy: false, werr };
                return { cls: "", busy: false, werr };
            }

            function scheduleStatus(ms) {
                clearTimeout(STATUSTIMER);
                STATUSTIMER = setTimeout(refreshStatus, ms);
            }

                const el = $("statuschip");
                if (!el) return;
                let s;
                try {
                    s = await J("/status");
                } catch (e) {
                    el.style.display = "none";
                    scheduleStatus(60000);
                    return;
                }
                STATUS = s;
                const idx = s.indexer || {},
                    age = s.index_age_s,
                    st = stState(s);
                const rel = age == null ? null : ago(Date.now() - age * 1000);
                // the pill: a dot + a short word, nothing more. detail lives in the popout.
                let word = st.busy
                    ? C("stIndexing")
                    : st.cls === "err"
                      ? C("stIndexErr")
                      : age == null
                        ? C("stNoIndex")
                        : `${C("stSynced")} ${rel}`;
                el.innerHTML = `<span class="sdot"></span>${word}`;
                el.className =
                    "statuschip" +
                    (st.cls ? " " + st.cls : "") +

                    STATUS_PREV &&
                    STATUS_PREV.phase === "indexing" &&
                    idx.phase !== "indexing"

                    smartWhat: "Semantic search, topic clustering, mood charts.",

            const SK = (k) => (SETUPC[curTheme()] || SETUPC.noir)[k] ?? SETUPC.noir[k];

            // Show the home-screen setup CTA only while something is actually missing.
            // /status is the cheap signal the app already has — but `semantic` alone
            // reads "off" while the search index warms after a server start, so a
            // machine that has ever produced enrichment data (arcs/summaries exist)
            // counts as set up. A fully-set-up machine gets no CTA — the popover's
            // `setup →` link and the palette remain the deliberate ways in.
            const setupNeeded = () => {
                if (!STATUS) return false;
                const cov = STATUS.coverage || {};
                const everEnriched = (cov.vibes || 0) > 0 || (cov.summaries || 0) > 0;
                return STATUS.semantic === "off" && !everEnriched;
            };

            function cmdRow(cmd) {

            function setupHTML(d) {

                    ? stores.map((s) => `${s.agent} ${fmt(s.found)}`).join(" · ")
                    : SK("storesNone");
                const idx = core.indexed
                    ? ` — ${SK("indexed")} ${fmt(core.indexed.sessions)} · ${ago(Date.now() - core.indexed.age_s * 1000)}`
                    : "";
                const missing = Object.entries(smart.deps || {})
                    .filter(([, v]) => !v)
                    .map(([k]) => k);
                return `<div class="setup">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px">
      <h2 style="margin:0;font-family:var(--mono);font-weight:600;font-size:15px;color:var(--ink)">${esc(SK("title"))}</h2>
      <span style="display:flex;gap:8px">
        <button class="sp-reidx" id="surecheck">${esc(SK("recheck"))}</button>
        <button class="sp-reidx" id="suback">${esc(SK("back"))}</button>
      </span>
    </div>
    <p style="margin:0;color:var(--dim)">${esc(SK("sub"))}</p>
    <div class="sc${core.live ? "" : " off"}">
      <div class="sch"><span class="tdot"></span><span class="nm">${esc(SK("core"))}</span><span class="what">${esc(SK("coreWhat"))}</span></div>

    </div>
    <div class="sc${smart.live ? "" : " off"}">
      <div class="sch"><span class="tdot"></span><span class="nm">${esc(SK("smart"))}</span><span class="what">${esc(SK("smartWhat"))}</span></div>
      ${
          smart.live
              ? `<div class="det2">${esc(SK("on"))} — ${esc(Object.keys(smart.deps || {}).join(" · "))}</div>`
              : `<div class="det2">${esc(SK("smartHow"))}${missing.length ? ` (missing: ${esc(missing.join(", "))})` : ""}</div>` +
                cmdRow("python tilt.py doctor --fix") +
                cmdRow("python tilt.py reindex")
      }
    </div>
    <div class="sc${named.live ? "" : " off"}">
      <div class="sch"><span class="tdot"></span><span class="nm">${esc(SK("named"))}</span><span class="what">${esc(SK("namedWhat"))}</span></div>
      ${
          named.live
              ? `<div class="det2">${esc(SK("on"))} — ${esc((named.models || []).join(", "))}</div>`
              : `<div class="det2">${esc(SK("namedHow"))}${named.ollama ? "" : ` — <a href="https://ollama.com" target="_blank" rel="noopener" style="color:var(--calm)">ollama.com</a>`}</div>` +
                cmdRow("ollama pull gemma2:2b")
      }
    </div>
  </div>`;
            }
            async function showSetup() {
                if (STATE.view !== "explore") showExplore();
                STATE.sel = null;
                const v = $("view");
                v.innerHTML = `<div class="setup"><div class="spin" style="padding:30px 0">${esc(SK("checking"))}</div></div>`;
                $("main").scrollTop = 0;
                let d;
                try {
                    d = await J("/doctor");
                } catch (e) {
                    v.innerHTML = `<div class="empty">${esc(String(e.message || e))}</div>`;
                    return;
                }
                v.innerHTML = setupHTML(d);
                v.querySelectorAll(".cmd button").forEach(
                    (b) =>
                        (b.onclick = async () => {
                            try {
                                await navigator.clipboard.writeText(b.dataset.cmd);
                                b.textContent = SK("copied");
                                setTimeout(() => (b.textContent = SK("copy")), 1400);
                            } catch (e) {}
                        }),
                );
                const r = $("surecheck");
                if (r) r.onclick = showSetup;
                const bk = $("suback");
                if (bk)
                    bk.onclick = () => {
                        $("view").innerHTML = "";

                    };
            }

            // ============================ command palette (ctrl+k) ============================
            // One box for every noun and verb: chats, live sessions, projects, views, theme,
            // index controls, live prefs. Plain text fuzzy-matches everything; prefixes narrow:
            //   >  commands   @  live sessions   #  projects   :  settings
            // Enter runs the row; alt+enter runs its alternate (e.g. resume-in-CLI for a chat).
            // Per theme it isn't a restyled box — web99 renders it as the OS Run dialog.
            const PKC = {
                noir: {
                    ph: "jump anywhere · run anything…",
                    now: "right now",
                    recent: "recent",
                    cmds: "commands",
                    chats: "chats",
                    sess: "live sessions",
                    proj: "projects",
                    set: "settings",
                    searchFor: "search content for",
                    none: "nothing matches.",
                    open: "open",
                    resume: "resume in cli",
                    watch: "watch live",
                    title: "run",
                },
                kawaii: {
                    ph: "where to, cutie? ♡",
                    now: "right now ♡",
                    recent: "fresh chats",
                    cmds: "things i can do",
                    chats: "chats",
                    sess: "buddies working",
                    proj: "projects",
                    set: "settings ✿",
                    searchFor: "peek inside chats for",
                    none: "hmm, nothing ;;",
                    open: "open ♡",
                    resume: "hop back in",
                    watch: "watch ♡",
                    title: "run ♡",
                },
                web99: {
                    ph: "Type the name of a program, folder, or document.",
                    now: "Running Now",
                    recent: "Recent Documents",
                    cmds: "Programs",
                    chats: "Documents",
                    sess: "Running Now",
                    proj: "Folders",
                    set: "Control Panel",
                    searchFor: "Search the archive for",
                    none: "No items match your search.",
                    open: "Open",
                    resume: "Resume in CLI",
                    watch: "Watch",
                    title: "Run",
                },
            };
            const PK = (k) => (PKC[curTheme()] || PKC.noir)[k] ?? PKC.noir[k] ?? k;

            // Subsequence fuzzy: word-start and run bonuses, earlier-match bonus.
            // Returns {score, idx} or null.
            function pkScore(q, s) {
                const t = String(s).toLowerCase();
                q = q.toLowerCase();
                let qi = 0,
                    score = 0,
                    last = -2;
                const idx = [];
                for (let i = 0; i < t.length && qi < q.length; i++) {
                    if (t[i] !== q[qi]) continue;
                    idx.push(i);
                    score += i === 0 || /[\s\-_/·.:#@]/.test(t[i - 1]) ? 3 : 1;
                    if (last === i - 1) score += 2;
                    last = i;
                    qi++;
                }
                if (qi < q.length) return null;
                score -= Math.floor((idx[0] || 0) / 4);
                return { score, idx };
            }
            function pkMark(s, idx) {
                if (!idx || !idx.length) return esc(s);
                let out = "",
                    j = 0;
                for (let i = 0; i < s.length; i++) {
                    const e = esc(s[i]);
                    if (j < idx.length && idx[j] === i) {
                        out += "<b>" + e + "</b>";
                        j++;
                    } else out += e;
                }
                return out;
            }
            // Filter+rank `items` (each {label, ...}) against q; q empty = take as-is.
            function pkRank(items, q, cap) {
                if (!q.trim()) return items.slice(0, cap);
                return items
                    .map((it) => {
                        const m = pkScore(q, it.label + " " + (it.meta || ""));
                        return m ? { ...it, _s: m.score, _i: m.idx } : null;
                    })
                    .filter(Boolean)
                    .sort((a, b) => b._s - a._s)
                    .slice(0, cap);
            }

            async function pkResume(agent, session) {
                try {
                    await fetch("/open_native", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ agent, session }),
                    });
                } catch (e) {}
            }

            // ---- providers: each returns [{icon,label,meta,run,alt?,altName?}] ----
            function pkChats(q, cap) {
                const items = CHATS.map((c) => ({
                    icon: "·",
                    label: chatTitle(c),
                    meta: `${c.agent} · ${dirOf(c)} · ${ago(c.last_ts) || ""}`,
                    run: () => openChat(c.session),
                    alt: () => pkResume(c.agent, c.session),
                    altName: PK("resume"),
                    _ts: c.last_ts || 0,
                }));
                if (!q.trim())
                    return items.toSorted((a, b) => b._ts - a._ts).slice(0, cap);
                return pkRank(items, q, cap);
            }
            function pkSessions(q, cap) {
                const now = Date.now();
                const items = Object.values(LIVE.sessions)
                    .filter((s) => lvIsLive(s, now))
                    .toSorted((a, b) => (b.last_ts || 0) - (a.last_ts || 0))
                    .map((s) => ({
                        icon: "●",
                        label: `${s.agent} · ${lvName(s)}`,
                        meta:
                            lvState(s.state) +
                            (s.model ? " · " + prettyModel(s.model) : ""),
                        run: () => {
                            LIVE.sel = s.agent + ":" + s.session;
                            setView("live");
                        },
                        alt: () => pkResume(s.agent, s.session),
                        altName: PK("resume"),
                    }));
                return pkRank(items, q, cap);
            }
            function pkProjects(q, cap) {
                const counts = {};
                CHATS.forEach((c) => {
                    const k = c.project && !isGenericDir(c.project) ? c.project : null;
                    if (k) counts[k] = (counts[k] || 0) + 1;
                });
                const items = Object.entries(counts)
                    .toSorted((a, b) => b[1] - a[1])
                    .map(([k, n]) => ({
                        icon: "#",
                        label: k,
                        meta: `${n}`,
                        run: () => {
                            setView("explore");
                            STATE.group = "project";
                            STATE.chip = k;
                            syncSegs();
                            renderRail();
                        },
                    }));
                return pkRank(items, q, cap);
            }
            function pkCommands(q, cap) {
                const items = [
                    { l: C("vExplore"), m: "view", f: () => setView("explore") },
                    { l: C("vLive"), m: "view", f: () => setView("live") },
                    { l: C("vPulse"), m: "view", f: () => setView("pulse") },
                    { l: SK("title"), m: "tiers", f: () => showSetup() },
                    { l: C("spReindex"), m: "index", f: () => forceReindex() },
                    { l: "status", m: "index", f: () => toggleStatus() },
                    {
                        l: C("findClear").replace(/[\[\]]/g, ""),
                        m: "search",
                        f: () => {
                            $("find").value = "";
                            $("findx").style.display = "none";
                            exitSearch();
                        },
                    },
                ].map((x) => ({ icon: "◆", label: x.l, meta: x.m, run: x.f }));
                return pkRank(items, q, cap);
            }
            function pkSettings(q, cap) {
                const setDense = (d) => {
                    LIVE.dense = d;
                    try {
                        localStorage.setItem("tiltLiveDensity", d);
                    } catch (e) {}
                    if (STATE.view === "live") renderLive();
                };
                const setNotify = (on) => {
                    LIVE.notify = on;
                    if (
                        on &&
                        typeof Notification !== "undefined" &&
                        Notification.permission === "default"
                    )
                        Notification.requestPermission();
                    try {
                        localStorage.setItem("tiltLiveNotify", on ? "1" : "0");
                    } catch (e) {}
                    if (STATE.view === "live") renderLive();
                };
                const setScale = (d) => {
                    LIVE.scale = Math.max(80, Math.min(180, LIVE.scale + d));
                    try {
                        localStorage.setItem("tiltLiveScale", String(LIVE.scale));
                    } catch (e) {}
                    const lvf = $("lvf");
                    if (lvf) lvf.style.fontSize = (12 * LIVE.scale) / 100 + "px";
                };
                const cur = curTheme();
                const items = [
                    ...THEMES.map(([t, lab]) => ({
                        icon: ":",
                        label: `theme · ${lab}`,
                        meta: t === cur ? "✓" : "",
                        run: () => setTheme(t),
                        keep: true,
                    })),
                    {
                        icon: ":",
                        label: `${C("liveCozy")} / ${C("liveCompact")}`,
                        meta: LIVE.dense,
                        run: () => setDense(LIVE.dense === "cozy" ? "compact" : "cozy"),
                        keep: true,
                    },
                    {
                        icon: ":",
                        label: C("liveNotify"),
                        meta: LIVE.notify ? "on" : "off",
                        run: () => setNotify(!LIVE.notify),
                        keep: true,
                    },
                    {
                        icon: ":",
                        label: `${C("liveSize")} +`,
                        meta: LIVE.scale + "%",
                        run: () => setScale(10),
                        keep: true,
                    },
                    {
                        icon: ":",
                        label: `${C("liveSize")} −`,
                        meta: LIVE.scale + "%",
                        run: () => setScale(-10),
                        keep: true,
                    },
                ];
                // Setup rows: the tier story, read from the same /status blob the pill uses.
                // A missing tier's row carries its exact unlock command — enter copies it.
                if (STATUS) {
                    const sem = STATUS.semantic;
                    const unlock = "python tilt.py doctor --fix";
                    items.push(
                        sem === "off"
                            ? {
                                  icon: "!",
                                  label: `${C("spSearch")} · ${C("stKeywordOnly")} — ${unlock}`,
                                  meta: "copy",
                                  run: () => {
                                      try {
                                          navigator.clipboard.writeText(unlock);
                                      } catch (e) {}
                                  },
                                  keep: true,
                              }
                            : {
                                  icon: ":",
                                  label: `${C("spSearch")} · ${sem === "loading" ? C("spSemLoad") : C("spSemFull")}`,
                                  meta: "✓",
                                  run: () => toggleStatus(),
                                  keep: true,
                              },
                    );
                    const cov = STATUS.coverage || {};
                    items.push({
                        icon: cov.emotions ? ":" : "!",
                        label: `${C("spEnrich")} · ${fmt(cov.vibes || 0)} ${C("spArcs")} · ${fmt(cov.summaries || 0)} ${C("spSumm")}`,
                        meta: cov.emotions ? "✓" : C("stNoAffect"),
                        run: () => toggleStatus(),
                        keep: true,
                    });
                    const idx = STATUS.indexer || {};
                    items.push({
                        icon: idx.last_err ? "!" : ":",
                        label: `${C("spLast")} · ${
                            idx.last_err
                                ? String(idx.last_err).slice(0, 60)
                                : idx.last_run
                                  ? `${ago(idx.last_run * 1000)} · ${idx.last_dur || 0}s`
                                  : C("spNever")
                        }`,
                        meta: C("spReindex"),
                        run: () => forceReindex(),
                        keep: true,
                    });
                }
                return pkRank(items, q, cap);
            }

            // ---- assemble result groups for a query ----
            function pkResults(q) {
                if (q.startsWith(">")) return [[PK("cmds"), pkCommands(q.slice(1), 12)]];
                if (q.startsWith("@")) return [[PK("sess"), pkSessions(q.slice(1), 12)]];
                if (q.startsWith("#")) return [[PK("proj"), pkProjects(q.slice(1), 14)]];
                if (q.startsWith(":")) return [[PK("set"), pkSettings(q.slice(1), 12)]];
                if (!q.trim()) {
                    // empty state = a "right now" dashboard, not a void
                    return [
                        [PK("now"), pkSessions("", 4)],
                        [PK("recent"), pkChats("", 5)],
                        [PK("cmds"), pkCommands("", 4)],
                    ];
                }
                const groups = [
                    [PK("chats"), pkChats(q, 6)],
                    [PK("sess"), pkSessions(q, 3)],
                    [PK("cmds"), pkCommands(q, 3)],
                    [PK("set"), pkSettings(q, 2)],
                    [PK("proj"), pkProjects(q, 3)],
                ];
                // escape hatch into real content search, always last
                groups.push([
                    "",
                    [
                        {
                            icon: "⌕",
                            label: `${PK("searchFor")} "${q}"`,
                            meta: "enter",
                            run: () => {
                                $("find").value = q;
                                $("findx").style.display = "";
                                runSearch(q);
                            },
                        },
                    ],
                ]);
                return groups;
            }

            // ---- palette state + render ----
            let PKOPEN = false,
                PKSEL = 0,
                PKROWS = [];
            function pkRender() {
                // theme can change from inside the palette (settings rows keep it open)
                $("pkin").placeholder = PK("ph");
                $("pktitle").textContent = PK("title");
                const q = $("pkin").value;
                const groups = pkResults(q).filter(([, items]) => items.length);
                PKROWS = groups.flatMap(([, items]) => items);
                if (PKSEL >= PKROWS.length) PKSEL = Math.max(0, PKROWS.length - 1);
                let i = 0,
                    html = "";
                for (const [name, items] of groups) {
                    if (name) html += `<div class="pk-grp">${esc(name)}</div>`;
                    for (const it of items) {
                        const sel = i === PKSEL;
                        const right =
                            sel && it.alt
                                ? `alt+enter ${esc(it.altName || "")}`
                                : esc(it.meta || "");
                        html += `<div class="pk-row${sel ? " sel" : ""}" data-i="${i}">
          <span class="ic">${it.icon}</span>
          <span class="lb">${pkMark(it.label, it._i)}</span>
          <span class="mt">${right}</span></div>`;
                        i++;
                    }
                }
                $("pklist").innerHTML =
                    html || `<div class="pk-empty">${PK("none")}</div>`;
                $("pkfoot").innerHTML =
                    `<span><b>&gt;</b> ${esc(PK("cmds"))}</span><span><b>@</b> ${esc(PK("sess"))}</span>` +
                    `<span><b>#</b> ${esc(PK("proj"))}</span><span><b>:</b> ${esc(PK("set"))}</span>` +
                    `<span style="margin-left:auto"><b>alt+enter</b></span>`;
                $("pklist")
                    .querySelectorAll(".pk-row")
                    .forEach((el) => {
                        el.onmousemove = () => {
                            if (PKSEL !== +el.dataset.i) {
                                PKSEL = +el.dataset.i;
                                pkRender();
                            }
                        };
                        el.onclick = () => pkRun(+el.dataset.i, false);
                    });
                const selEl = $("pklist").querySelector(".pk-row.sel");
                if (selEl) selEl.scrollIntoView({ block: "nearest" });
            }
            function pkRun(i, alt) {
                const it = PKROWS[i];
                if (!it) return;
                const fn = alt && it.alt ? it.alt : it.run;
                if (!it.keep) pkClose();
                fn();
                if (it.keep) pkRender(); // settings rows stay open and reflect the change
            }
            function pkOpen(prefill) {
                PKOPEN = true;
                PKSEL = 0;
                $("cmdk").classList.add("open");
                $("pktitle").textContent = PK("title");
                const inp = $("pkin");
                inp.placeholder = PK("ph");
                inp.value = prefill || "";
                inp.focus();
                pkRender();
            }
            function pkClose() {
                PKOPEN = false;
                $("cmdk").classList.remove("open");
                $("pkin").blur();
            }
            $("pkscrim").onclick = pkClose;
            $("pkx").onclick = pkClose;
            $("pkin").addEventListener("input", () => {
                PKSEL = 0;
                pkRender();
            });
            $("pkin").addEventListener("keydown", (e) => {
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    PKSEL = Math.min(PKROWS.length - 1, PKSEL + 1);
                    pkRender();
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    PKSEL = Math.max(0, PKSEL - 1);
                    pkRender();
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    pkRun(PKSEL, e.altKey);
                } else if (e.key === "Escape") {
                    e.preventDefault();
                    if ($("pkin").value) {
                        $("pkin").value = "";
                        PKSEL = 0;
                        pkRender();
                    } else pkClose();
                }
                e.stopPropagation();
            });

            async function boot() {
                const P = window.__pre || {};
                try {
                    CHATS =
                        (P.chats ? await P.chats : null) || (await J("/chats"));
                    CONCEPTS =
                        (P.concepts ? await P.concepts : null) ||
                        (await J("/concepts").catch(() => []));
                    STATS = P.stats ? await P.stats : null;
                } catch (e) {
                    $("list").innerHTML =
                        `<div class="empty">${C("emptyNoIndex")}</div>`;
                    return;
                }
                CHATS.forEach((c) => (bySession[c.session] = c));
                if (STATS && STATS.user_seg) GENERICSEG.add(STATS.user_seg); // whoever runs tilt
                BOOTED = true;
                syncSegs();
                renderStat();
                renderRail();
                if (location.hash) {
                    HASHME = location.hash;
                    applyHash();
                } else showPlaceholder();
                liveBadge();
                setInterval(liveBadge, 45000); // live-activity dot on the view toggle
                refreshStatus(); // self-schedules: fast while indexing, slow when idle
                ensureStream(); // rail overlay: chats bump/appear the moment any agent works
            }
            boot();

            // ---- draggable rail width, persisted ----
            (() => {
                const w = +(PREF("tiltRailW") || 0);
                if (w)
                    document.documentElement.style.setProperty(
                        "--railw",
                        Math.max(240, Math.min(640, w)) + "px",
                    );
                const g = $("gutter");
                if (!g) return;
                g.onmousedown = (e) => {
                    e.preventDefault();
                    g.classList.add("drag");
                    document.body.style.userSelect = "none";
                    const move = (ev) =>
                        document.documentElement.style.setProperty(
                            "--railw",
                            Math.max(240, Math.min(640, ev.clientX)) + "px",
                        );
                    const up = (ev) => {
                        document.removeEventListener("mousemove", move);
                        document.removeEventListener("mouseup", up);
                        g.classList.remove("drag");
                        document.body.style.userSelect = "";
                        try {
                            localStorage.setItem(
                                "tiltRailW",
                                String(
                                    Math.max(240, Math.min(640, ev.clientX)),
                                ),
                            );
                        } catch (e2) {}
                    };
                    document.addEventListener("mousemove", move);
                    document.addEventListener("mouseup", up);
                };
            })();

            // A tab left open across a reindex would keep stale rows forever: refetch the rail when
            // the window regains focus and the list is >2 min old. Cheap (one gzipped /chats), and
            // CHATCACHE drops too so reopened chats reflect the new index.
            let CHATSAT = Date.now();
            window.addEventListener("focus", async () => {
                if (!BOOTED || Date.now() - CHATSAT < 120000) return;
                CHATSAT = Date.now();
                try {
                    const fresh = await J("/chats");
                    CHATS = fresh;
                    CHATS.forEach((c) => (bySession[c.session] = c));
                    CHATCACHE.clear();
                    if (STATE.view === "explore" && !SEARCH.active)
                        renderRail();
                } catch (e) {}
            });
        </script>
    </body>
</html>
