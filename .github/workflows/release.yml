name: release

# Build one platform-tagged wheel per OS/arch (each carries the prebuilt agrep-rs
# binary), plus an sdist, and publish to PyPI on a v* tag. The wheel is py3-none-<plat>
# (any python 3.10+, one platform) - see hatch_build.py.
#
# Publishing uses PyPI Trusted Publishing (OIDC). npm publishing uses the
# `NPM_TOKEN` repository secret and still attaches provenance from GitHub Actions.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      npm_only:
        description: "Publish npm packages only from this ref"
        type: boolean
        default: false

jobs:
  wheels:
    name: wheel ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_only != true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: win-x64,   os: windows-latest, plat: win_amd64,            rustflags: "-C target-cpu=x86-64-v2" }
          # macos-13 (the old intel image) is retired; macos-15-intel is the last
          # x86_64 image GitHub will ever host (gone Aug 2027 - drop this wheel then).
          - { name: mac-x64,   os: macos-15-intel, plat: macosx_10_12_x86_64,  rustflags: "-C target-cpu=x86-64-v2" }
          - { name: mac-arm64, os: macos-14,       plat: macosx_11_0_arm64,    rustflags: "" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: build ingest binary
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          # .cargo/config.toml pins target-cpu=native, which is right for build-where-you-run
          # but poison for distributed wheels (SIGILL on older CPUs). Build portable here:
          # x86-64-v2 floor on x64, default baseline on arm64.
          rm -f .cargo/config.toml
          cargo build --release
      - name: stage binary
        shell: bash
        run: |
          mkdir -p _bin
          if [ "${{ runner.os }}" = "Windows" ]; then cp target/release/agrep-rs.exe _bin/;
          else cp target/release/agrep-rs _bin/; fi
      - name: build wheel
        shell: bash
        env:
          AGREP_WHEEL_PLAT: ${{ matrix.plat }}
        run: |
          python -m pip install -U build
          python -m build --wheel
      - name: smoke test wheel
        shell: bash
        run: |
          # Install the wheel we just built and actually run it: --version proves the
          # entry point + bundled binary resolve; a search proves the rust ingest
          # spawns, builds an (empty) index, and exits like grep. Exit 1 = no match
          # on a storeless runner, which is correct; anything above 1 is a crash.
          python -m pip install dist/*.whl
          agrep --version
          agrep "smoke-needle-$RANDOM" && rc=0 || rc=$?
          if [ "$rc" -gt 1 ]; then echo "search crashed (exit $rc)"; exit 1; fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # Linux wheels build INSIDE a manylinux container so the rust binary links an old
  # glibc and the manylinux_2_28 tag is truthful (PyPI rejects plain linux_x86_64).
  wheels-linux:
    name: wheel linux-x64
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_only != true }}
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: build + wheel
        env:
          AGREP_WHEEL_PLAT: manylinux_2_28_x86_64
          RUSTFLAGS: "-C target-cpu=x86-64-v2"
        run: |
          source "$HOME/.cargo/env"
          rm -f .cargo/config.toml  # drop target-cpu=native; see the wheels job
          cargo build --release
          mkdir -p _bin && cp target/release/agrep-rs _bin/
          PYBIN=/opt/python/cp312-cp312/bin
          "$PYBIN/pip" install -U build
          "$PYBIN/python" -m build --wheel
          # same smoke as the matrix jobs (see above)
          "$PYBIN/pip" install dist/*.whl
          "$PYBIN/agrep" --version
          "$PYBIN/agrep" "smoke-needle-$RANDOM" && rc=0 || rc=$?
          if [ "$rc" -gt 1 ]; then echo "search crashed (exit $rc)"; exit 1; fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x64
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_only != true }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install -U build && python -m build --sdist
      - uses: actions/upload-artifact@v4
        with: { name: sdist, path: dist/*.tar.gz }

  npm-smoke:
    name: npm shim smoke
    needs: [wheels-linux]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_only != true }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x64
          path: dist
      - name: version parity
        shell: bash
        run: |
          py_ver=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path("agrep/__init__.py").read_text()
          print(re.search(r'__version__ = "([^"]+)"', text).group(1))
          PY
          )
          npm_ver=$(node -p "require('./npm/package.json').version")
          test "$py_ver" = "$npm_ver" || {
            echo "version mismatch: PyPI $py_ver vs npm $npm_ver"
            exit 1
          }
      - name: run shim against built wheel
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -n1)
          tmp=$(mktemp -d)
          npm install -g --prefix "$tmp" ./npm
          AGREP_PYPI_SPEC="$wheel" "$tmp/bin/agrep" --version

  npm-auth:
    name: npm auth preflight
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest && npm --version
      - name: verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN repository secret is required before publishing PyPI, @mundy/agrep, and agrep-cli."
            exit 1
          fi
          npm whoami

  publish:
    needs: [wheels, wheels-linux, sdist, npm-smoke, npm-auth]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: [publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest && npm --version
      - name: publish scoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./npm/package.json').version")
          if npm view "@mundy/agrep@$version" version >/dev/null 2>&1; then
            echo "@mundy/agrep@$version already published"
          else
            npm publish ./npm --access public --provenance
          fi
      - name: publish unscoped alias
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./npm/package.json').version")
          if npm view "agrep-cli@$version" version >/dev/null 2>&1; then
            echo "agrep-cli@$version already published"
          else
            tmp=$(mktemp -d)
            cp -R npm/. "$tmp/"
            node -e "const fs=require('fs'); const p='$tmp/package.json'; const j=require(p); j.name='agrep-cli'; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n')"
            npm publish --access public --provenance "$tmp"
          fi

  publish-npm-manual:
    name: publish npm manually
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_only == true }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest && npm --version
      - name: verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN repository secret is required to publish @mundy/agrep and agrep-cli."
            exit 1
          fi
          npm whoami
      - name: verify matching PyPI release exists
        shell: bash
        run: |
          version=$(node -p "require('./npm/package.json').version")
          python - "$version" <<'PY'
          import sys, urllib.request
          version = sys.argv[1]
          with urllib.request.urlopen(f"https://pypi.org/pypi/agrep/{version}/json") as response:
              if response.status != 200:
                  raise SystemExit(f"PyPI agrep {version} returned HTTP {response.status}")
          print(f"PyPI agrep {version} exists")
          PY
      - name: publish scoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./npm/package.json').version")
          if npm view "@mundy/agrep@$version" version >/dev/null 2>&1; then
            echo "@mundy/agrep@$version already published"
          else
            npm publish ./npm --access public --provenance
          fi
      - name: publish unscoped alias
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./npm/package.json').version")
          if npm view "agrep-cli@$version" version >/dev/null 2>&1; then
            echo "agrep-cli@$version already published"
          else
            tmp=$(mktemp -d)
            cp -R npm/. "$tmp/"
            node -e "const fs=require('fs'); const p='$tmp/package.json'; const j=require(p); j.name='agrep-cli'; fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n')"
            npm publish --access public --provenance "$tmp"
          fi
